{% extends 'base.html' %}
{% load static %}

{% block title %}Edit Profile{% endblock %}

{% block content %}

<section style="padding-top: 80px;">
    <div class="container py-3">
        <h2 class="text-center font-weight-bold mb-5 text-primary">Edit Account Information</h2>
        
        <div class="row">
            <div class="col-md-6 mx-auto">
                <div class="card border-0 shadow-lg p-5 bg-white rounded-lg">
                    <form method="POST">
                        {% csrf_token %}
                        <div class="form-group mb-4">
                            <label class="font-weight-bold">First Name</label>
                            <input type="text" name="firstname" value="{{request.user.first_name}}" class="form-control p-3 border rounded shadow-sm" required>
                        </div>
                        
                        <div class="form-group mb-4">
                            <label class="font-weight-bold">Last Name</label>
                            <input type="text" name="lastname" value="{{request.user.last_name}}" class="form-control p-3 border rounded shadow-sm" required>
                        </div>

                        <div class="form-group mb-5">
                            <label class="font-weight-bold">Email Address</label>
                            <input type="email" name="email" value="{{request.user.email}}" class="form-control p-3 border rounded shadow-sm" required>
                        </div>

                        <div class="text-center d-grid">
                            <input type="submit" value="Save Changes" class="btn btn-primary btn-lg rounded-pill shadow font-weight-bold">
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>

{% if error == "no" %}
<script>
    alert('Admin profile updated successfully.');
    window.location = "{% url 'admin_profile' %}";
</script>
{% elif error == "yes" %}
<script>
    alert('An unexpected error occurred. Please try again.');
</script>
{% endif %}

{% endblock %}
