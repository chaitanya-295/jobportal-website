{% extends 'base.html' %}
{% load static %}

{% block title %}Update Identity{% endblock %}

{% block content %}

<section style="padding-top: 80px;">
    <div class="container py-3">
        <h2 class="text-center font-weight-bold mb-5 text-primary">Modify Profile Details</h2>
        
        <div class="row">
            <div class="col-md-7 mx-auto">
                <div class="card border-0 shadow-lg p-5 bg-white rounded-lg">
                    <form method="POST" enctype="multipart/form-data">
                        {% csrf_token %}
                        <div class="row g-4">
                            <div class="col-md-12">
                                <h5 class="font-weight-bold mb-3 border-bottom pb-2 text-dark">Basic Information</h5>
                            </div>
                            <div class="col-md-6 mb-4">
                                <label class="font-weight-bold">First Name</label>
                                <input type="text" name="firstname" value="{{student.user.first_name}}" class="form-control p-3 border rounded shadow-sm" required>
                            </div>
                            
                            <div class="col-md-6 mb-4">
                                <label class="font-weight-bold">Last Name</label>
                                <input type="text" name="lastname" value="{{student.user.last_name}}" class="form-control p-3 border rounded shadow-sm" required>
                            </div>

                            <div class="col-md-6 mb-4">
                                <label class="font-weight-bold">Mobile Link Number</label>
                                <input type="text" name="contact" value="{{student.mobile}}" class="form-control p-3 border rounded shadow-sm" required>
                            </div>

                            <div class="col-md-6 mb-4">
                                <label class="font-weight-bold">Gender Identity</label>
                                <select name="gender" class="form-control p-3 border rounded shadow-sm" required>
                                    <option value="male" {% if student.gender == 'male' %}selected{% endif %}>Male</option>
                                    <option value="female" {% if student.gender == 'female' %}selected{% endif %}>Female</option>
                                </select>
                            </div>

                            <div class="col-md-12 mb-5">
                                <label class="font-weight-bold">Update Profile Picture</label>
                                <input type="file" name="image" class="form-control p-3 border rounded shadow-sm mb-2">
                                <small class="text-muted">Currently: <a href="{{student.image.url}}" target="_blank">{{student.image.name}}</a></small>
                            </div>

                            <div class="text-center d-grid gap-3">
                                <input type="submit" value="Save Identity Updates" class="btn btn-primary btn-lg rounded-pill shadow font-weight-bold py-3">
                                <a href="{% url 'user_profile' %}" class="btn btn-link text-muted font-weight-bold">Discard Changes</a>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>

{% if error == "no" %}
<script>
    alert('Account details successfully updated.');
    window.location = "{% url 'user_profile' %}";
</script>
{% elif error == "yes" %}
<script>
    alert('An unexpected error occurred during sync. Please try again.');
</script>
{% endif %}

<style>
    .rounded-lg { border-radius: 2rem !important; }
</style>

{% endblock %}
