{% extends 'base.html' %}
{% load static %}

{% block title %}Change Password{% endblock %}

{% block content %}

<section style="padding-top: 80px;">
    <div class="container py-3">
        <h2 class="text-center font-weight-bold mb-5 text-primary">Update Secure Credentials</h2>
        
        <div class="row">
            <div class="col-md-6 mx-auto">
                <div class="card border-0 shadow-lg p-5 bg-white rounded-lg">
                    <form method="POST" class="needs-validation">
                        {% csrf_token %}
                        <div class="form-group mb-4">
                            <label class="font-weight-bold"><i class="fa fa-lock mr-2 text-primary"></i> Current Password</label>
                            <input type="password" name="currentpassword" class="form-control p-4 rounded-pill border shadow-sm" placeholder="Enter current password" required>
                        </div>
                        
                        <div class="form-group mb-4">
                            <label class="font-weight-bold"><i class="fa fa-key mr-2 text-primary"></i> New Security Key</label>
                            <input type="password" name="newpassword" class="form-control p-4 rounded-pill border shadow-sm" placeholder="Define new password" required>
                        </div>

                        <div class="form-group mb-5">
                            <label class="font-weight-bold"><i class="fa fa-check-circle mr-2 text-primary"></i> Confirm Security Key</label>
                            <input type="password" name="repeatpassword" class="form-control p-4 rounded-pill border shadow-sm" placeholder="Re-enter for verification" required>
                        </div>

                        <div class="text-center d-grid gap-3">
                            <input type="submit" value="Update My Password" class="btn btn-primary btn-lg rounded-pill px-5 shadow font-weight-bold">
                            <a href="{% url 'admin_profile' %}" class="btn btn-link text-muted font-weight-bold">Discard Changes</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>

{% if error == "no" %}
<script>
    alert('Security verification successful. Admin password has been updated.');
    window.location = "{% url 'Logout' %}";
</script>
{% elif error == "yes" %}
<script>
    alert('Failed! Current password verification is incorrect. Try again.');
</script>
{% elif error == "nismatch" %}
<script>
    alert('Verification failed! New password confirmation does not match.');
</script>
{% endif %}

<style>
    .rounded-lg { border-radius: 2rem !important; }
</style>

{% endblock %}
